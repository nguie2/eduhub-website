function useIntersection(options = {}) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(() => window.innerWidth <= 640);
  useEffect(() => {
    if (window.innerWidth <= 640) {
      setVisible(true);
      return;
    }
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.05, rootMargin: '0px', ...options });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function FadeUp({ children, delay = 0, style = {} }) {
  const [ref, visible] = useIntersection();
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(32px)',
      transition: `opacity 0.6s ease ${delay}ms, transform 0.6s ease ${delay}ms`,
      ...style
    }}>
      {children}
    </div>
  );
}

                  </p>
                </div>
              </div>
            </FadeUp>
          </div>
        </section>

        {/* Post Grid */}
        <section className="blog-page-section" style={{ padding: pagePad, borderBottom: '1.5px solid var(--ink)' }}>

            <FadeUp>
              <h2 style={{ fontSize: '28px', fontWeight: 800, letterSpacing: '-0.5px', marginBottom: '36px' }}>Latest articles</h2>
            </FadeUp>
            <div className="blog-grid">
              {posts.map((post, i) => (
                <PostCard key={i} post={post} delay={i * 80} />
              ))}
            </div>
          </div>
        </section>

        {/* Newsletter CTA */}
        <section className="blog-page-section" style={{ background: 'var(--ink)', borderTop: '1.5px solid var(--ink)', padding: mobile ? '56px 20px' : '80px 40px' }}>
          <div style={{ maxWidth: '600px', margin: '0 auto', textAlign: 'center' }}>
            <FadeUp>
              <h2 style={{ fontSize: 'clamp(26px, 3.5vw, 38px)', fontWeight: 800, letterSpacing: '-1px', color: 'var(--bg)', marginBottom: '12px' }}>
                Get school leadership insights in your inbox.
              </h2>
              <p style={{ color: 'rgba(250,250,242,0.6)', fontSize: '16px', marginBottom: '32px' }}>
                New articles on school management, POPIA compliance, and product updates — delivered monthly.
              </p>
              <div className="blog-newsletter-row" style={{ display: 'flex', gap: '0', maxWidth: '480px', margin: '0 auto' }}>
                <input
                  type="email"
                  placeholder="your@school.ac.za"
                  style={{
                    flex: 1, padding: '14px 18px', border: '1.5px solid var(--bg)',
                    borderRight: 'none', borderRadius: '100px 0 0 100px',
                    background: 'rgba(255,255,255,0.08)', color: 'var(--bg)',
                    fontSize: '15px', fontFamily: 'Plus Jakarta Sans', outline: 'none',
                  }}
                />
                <a
                  href="mailto:infos@eduhubsa.online"
                  style={{
                    background: 'var(--lime)', color: 'var(--ink)',
                    border: '1.5px solid var(--bg)', borderRadius: '0 100px 100px 0',
                    padding: '14px 24px', fontWeight: 700, fontSize: '14px',
                    textDecoration: 'none', display: 'inline-flex', alignItems: 'center', whiteSpace: 'nowrap',
                    boxShadow: 'none', fontFamily: 'Plus Jakarta Sans',
                  }}
                >
                  Subscribe
                </a>
              </div>
            </FadeUp>
          </div>
        </section>
      </main>
      <Footer />
    </div>
  );
}
