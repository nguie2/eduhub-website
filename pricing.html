<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pricing — EduHubSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const NAV_LINKS=[['index.html#features','Features'],['case-studies.html','Case Studies'],['blog.html','Blog'],['pricing.html','Pricing'],['contact.html','Need help?']];
const FOOT_COLS=[{h:'Product',links:[['index.html#features','Features'],['pricing.html','Pricing'],['integrations.html','Integrations'],['changelog.html','Changelog'],['roadmap.html','Roadmap']]},{h:'Resources',links:[['case-studies.html','Case studies'],['help.html','Help centre'],['migration.html','Migration guide'],['blog.html','Blog'],['mailto:infos@eduhubsa.online','infos@eduhubsa.online']]},{h:'Company',links:[['about.html','About'],['careers.html','Careers'],['contact.html','Contact'],['privacy.html','POPIA & Privacy'],['terms.html','Terms']]}];
function Nav(){const[s,setS]=React.useState(false);const[m,setM]=React.useState(false);React.useEffect(()=>{const f=()=>setS(window.scrollY>12);f();window.addEventListener('scroll',f,{passive:true});return()=>window.removeEventListener('scroll',f);},[]);return(<header className={`nav-wrap ${s?'scrolled':''}`}><div className="container nav"><a href="index.html" className="brand"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polygon points="14,4 26,10 14,16 2,10" fill="var(--lime)" stroke="var(--ink)" strokeWidth="1.5" strokeLinejoin="round"/><path d="M6 12.5V19.5C6 19.5 9.5 22.5 14 22.5C18.5 22.5 22 19.5 22 19.5V12.5" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round" fill="none"/><line x1="26" y1="10" x2="26" y2="17" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round"/><circle cx="26" cy="17.5" r="1.5" fill="var(--ink)"/></svg>eduhub<span style={{color:'var(--lime-deep)'}}>sa</span></a><nav className={`nav-links${m?' open':''}`}>{NAV_LINKS.map(([h,l])=><a key={l} className="nav-link" href={h}>{l}</a>)}</nav><a className="btn nav-cta" href="contact.html">Start free trial</a><button className="nav-burger" onClick={()=>setM(m=>!m)} aria-label="Menu">{m?<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>}</button></div></header>);}
function Footer(){return(<footer className="footer"><div className="container"><div className="foot-grid"><div><a href="index.html" className="brand" style={{color:'var(--bg)'}}><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polygon points="14,4 26,10 14,16 2,10" fill="var(--lime)" stroke="var(--ink)" strokeWidth="1.5" strokeLinejoin="round"/><path d="M6 12.5V19.5C6 19.5 9.5 22.5 14 22.5C18.5 22.5 22 19.5 22 19.5V12.5" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round" fill="none"/><line x1="26" y1="10" x2="26" y2="17" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round"/><circle cx="26" cy="17.5" r="1.5" fill="var(--ink)"/></svg>eduhubsa</a><p className="foot-blurb">A calm, low-cost institution management system built in South Africa, for South African schools and universities. POPIA-compliant. Loadshedding-friendly.</p></div>{FOOT_COLS.map(({h,links})=><div key={h}><h5>{h}</h5><ul>{links.map(([href,label])=><li key={label}><a href={href}>{label}</a></li>)}</ul></div>)}</div><div className="foot-bottom"><div>© 2026 EduHubSA (Pty) Ltd. Made in Johannesburg.</div><div className="links"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="security.html">Security</a></div></div></div></footer>);}

function Plan({name,blurb,feats,featured,tag,best}){
  return(
    <article className={`plan ${featured?'featured':''}`} style={best?{border:'2px solid var(--ink)'}:{}}>
      {tag&&<span className="plan-tag">{tag}</span>}
      <h3>{name}</h3>
      <p className="blurb">{blurb}</p>
      <div style={{margin:'20px 0',padding:'16px',background:featured?'rgba(255,255,255,.08)':'var(--bg-2)',borderRadius:10,border:featured?'1px solid rgba(255,255,255,.12)':'1px solid var(--hair)'}}>
        <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:featured?'rgba(250,250,242,.6)':'var(--muted)',marginBottom:6}}>Pricing</div>
        <div style={{fontSize:20,fontWeight:800,lineHeight:1.2}}>Contact us for a quote</div>
        <div style={{fontSize:13,color:featured?'rgba(250,250,242,.55)':'var(--muted)',marginTop:4}}>Tailored to your institution's size</div>
      </div>
      <ul className="feat-list">{feats.map((f,i)=><li key={i}>{f}</li>)}</ul>
      <a className={`btn ${featured?'':'btn-dark'}`} style={featured?{}:{background:'var(--ink)',color:'var(--bg)'}} href="contact.html">
        Request a quote
        <span className="btn-arrow"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
      </a>
    </article>
  );
}

const plans=[
  {name:'Starter',blurb:'For small schools getting organised',feats:['Up to 500 learners','Student records & attendance','Parent SMS notifications','Basic timetable builder','Email support']},
  {name:'School',blurb:'The full system for high schools',featured:true,tag:'Most popular',feats:['Unlimited learners','Fees, finance & PayShap','WhatsApp parent portal','Auto-timetable engine','Offline-first sync','Priority support — 1hr SLA']},
  {name:'University',blurb:'For tertiary institutions & faculties',feats:['Faculty & department modules','LMS integrations (Moodle, Canvas)','SAQA/NSFAS reporting','Single sign-on (SAML/OIDC)','Dedicated success manager','On-site training & migration']},
];
const faqs=[
  {q:'How is pricing structured?',a:'We charge per active learner per month. This means small schools pay small amounts and only pay for what they use. Contact us and we\'ll put together a quote based on your learner count and province.'},
  {q:'Are there any setup or once-off fees?',a:'No setup costs, ever. We help you migrate your data, train your staff, and get your first roll-call done — all included.'},
  {q:'Can we start with a free trial?',a:'Yes. 30 days, all features, no credit card required. We\'ll be there every step of the way.'},
  {q:'What if we need to cancel?',a:'Cancel any time. Your data is exported to you in full within 48 hours. No lock-in.'},
  {q:'Do you offer discounts for public schools or NPOs?',a:'Yes — we have special rates for no-fee schools and non-profit educational institutions. Email infos@eduhubsa.online to discuss.'},
  {q:'Is there a difference in features between plans?',a:'Starter is designed for smaller schools and has a 500-learner cap. School and University are feature-complete. The main difference is scale and the modules relevant to tertiary institutions.'},
];

function Page(){
  return(
    <>
      <section className="page-hero">
        <div className="container">
          <span className="section-eyebrow"><span className="dot"/>Pricing</span>
          <h1 style={{marginTop:14}}>Simple plans,<br/>transparent value.</h1>
          <p>We tailor pricing to your institution's size and needs. No hidden modules, no surprise add-ons. Email us and we'll send a quote within 24 hours.</p>
          <div style={{marginTop:24,display:'inline-flex',alignItems:'center',gap:10,background:'var(--bg-2)',border:'1.5px solid var(--ink)',padding:'12px 22px',borderRadius:999,boxShadow:'3px 3px 0 var(--ink)'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span style={{fontSize:15,fontWeight:700}}>Get a quote: <a href="mailto:infos@eduhubsa.online" style={{fontWeight:800,borderBottom:'1.5px solid var(--ink)'}}>infos@eduhubsa.online</a></span>
          </div>
        </div>
      </section>

      <section className="inner-section">
        <div className="container">
          <div className="pricing-grid" style={{marginBottom:80}}>
            {plans.map((p,i)=><Plan key={i} {...p}/>)}
          </div>

          <div style={{background:'var(--ink)',borderRadius:22,padding:'56px 48px',color:'var(--bg)',marginBottom:80,display:'grid',gridTemplateColumns:'1fr 1fr',gap:48,alignItems:'center'}}>
            <div>
              <span style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(250,250,242,.5)'}}>Why pricing on request?</span>
              <h2 style={{fontSize:34,fontWeight:800,letterSpacing:'-.02em',lineHeight:1.05,margin:'14px 0 16px',color:'var(--bg)'}}>Your institution is unique.<br/>Your pricing should be too.</h2>
              <p style={{fontSize:16,color:'rgba(250,250,242,.75)',lineHeight:1.65,margin:0}}>A 200-learner community school in the Northern Cape has very different needs to a 15,000-student university in Johannesburg. We don't believe in a one-size-fits-all price list. Tell us about your institution and we'll tell you exactly what you'll pay — no pressure, no sales tactics.</p>
            </div>
            <div style={{display:'grid',gap:14}}>
              {[['No setup cost','We import your data and train your staff — included.'],['No hidden modules','Every feature in your plan is included, always.'],['No lock-in','Cancel anytime, full data export in 48 hours.'],['30-day free trial','All features, all plans, no credit card needed.']].map(([t,d])=>(
                <div key={t} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:10,padding:'14px 16px'}}>
                  <div style={{fontWeight:700,marginBottom:4}}>{t}</div>
                  <div style={{fontSize:13,color:'rgba(250,250,242,.65)'}}>{d}</div>
                </div>
              ))}
            </div>
          </div>

          <div>
            <div className="section-head center">
              <span className="section-eyebrow"><span className="dot"/>FAQ</span>
              <h2 className="section-title">Pricing questions answered</h2>
            </div>
            <div className="card-grid-2">
              {faqs.map(({q,a},i)=>(
                <div key={i} className="inner-card">
                  <h3 style={{fontSize:17,fontWeight:800,margin:'0 0 8px'}}>{q}</h3>
                  <p style={{fontSize:14,color:'var(--ink-2)',margin:0,lineHeight:1.6}}>{a}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      <section style={{background:'var(--lime)',borderTop:'1.5px solid var(--ink)',borderBottom:'1.5px solid var(--ink)',padding:'72px 0'}}>
        <div className="container" style={{textAlign:'center'}}>
          <h2 style={{fontSize:40,fontWeight:800,letterSpacing:'-.03em',margin:'0 0 12px'}}>Ready to get started?</h2>
          <p style={{fontSize:18,color:'var(--ink-2)',maxWidth:'50ch',margin:'0 auto 28px'}}>Set up in under an hour. 30-day trial, no credit card. Email us and we'll have you running before lunch.</p>
          <div style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'}}>
            <a className="btn btn-dark" href="contact.html">Request a quote</a>
            <a className="btn" style={{background:'#fff'}} href="mailto:infos@eduhubsa.online">Email us directly</a>
          </div>
        </div>
      </section>
    </>
  );
}

function App(){
  React.useEffect(()=>{
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12,rootMargin:'0px 0px -60px 0px'});
    document.querySelectorAll('.plan,.inner-card,.section-eyebrow,.section-title').forEach(el=>{el.classList.add('fade-up');io.observe(el);});
    return()=>io.disconnect();
  },[]);
  return(<><Nav/><main><Page/></main><Footer/></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
