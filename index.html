<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EduHubSA — Run your institution, not the chaos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #FAFAF2;
  --bg-2: #F2F1E6;
  --ink: #0E0E0C;
  --ink-2: #2C2C28;
  --muted: #6B6B62;
  --line: #1a1a17;
  --hair: rgba(14,14,12,.10);

  --lime: #C8F23A;
  --lime-2: #B0E51A;
  --lime-deep: #82B007;
  --mint: #BFE9C5;
  --pine: #2F6B3C;
  --grass: #4FA661;
  --lilac: #C8B8F0;
  --peach: #F8C9A1;
  --cream: #F5E7C8;

  --r-1: 8px;
  --r-2: 14px;
  --r-3: 22px;
  --r-pill: 999px;

  --shadow-sm: 0 1px 0 rgba(14,14,12,.06), 0 2px 6px rgba(14,14,12,.04);
  --shadow-md: 0 8px 24px -10px rgba(14,14,12,.18);
  --shadow-card: 0 22px 40px -20px rgba(14,14,12,.25);

  --font-sans: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
  --font-hand: "Caveat", cursive;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 28px;
}

/* ---------- Nav ---------- */
.nav-wrap {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklab, var(--bg) 92%, transparent);
  backdrop-filter: saturate(140%) blur(10px);
  border-bottom: 1px solid transparent;
  transition: border-color .25s ease, background .25s ease;
}
.nav-wrap.scrolled { border-bottom-color: var(--hair); }
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 78px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -.02em;
}
.brand-mark {
  width: 34px; height: 34px;
  background: var(--ink);
  border-radius: 9px;
  display: grid; place-items: center;
  color: var(--lime);
  transform: rotate(-6deg);
  transition: transform .35s cubic-bezier(.2,.8,.2,1);
}
.brand:hover .brand-mark { transform: rotate(6deg) scale(1.06); }
.brand-mark svg { width: 18px; height: 18px; }

.nav-links {
  display: flex;
  align-items: center;
  gap: 38px;
}
.nav-link {
  font-weight: 500;
  font-size: 15.5px;
  color: var(--ink);
  position: relative;
  padding: 6px 0;
}
.nav-link::after {
  content: "";
  position: absolute; left: 0; bottom: 0;
  width: 0; height: 2px;
  background: var(--ink);
  transition: width .3s cubic-bezier(.2,.8,.2,1);
}
.nav-link:hover::after { width: 100%; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: 1.5px solid var(--ink);
  background: var(--lime);
  color: var(--ink);
  font-weight: 700;
  font-size: 15px;
  padding: 12px 22px;
  border-radius: var(--r-pill);
  box-shadow: 3px 3px 0 var(--ink);
  transition: transform .15s ease, box-shadow .15s ease, background .2s ease;
  white-space: nowrap;
}
.btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); background: var(--lime-2); }
.btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
.btn-ghost {
  background: transparent;
  box-shadow: none;
}
.btn-ghost:hover { background: var(--bg-2); box-shadow: none; transform: none; }
.btn-dark {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.btn-dark:hover { background: #1f1f1c; }

.btn-arrow {
  display: inline-grid; place-items: center;
  width: 22px; height: 22px;
  background: var(--ink); color: var(--lime);
  border-radius: 50%;
  transition: transform .3s cubic-bezier(.2,.8,.2,1);
}
.btn:hover .btn-arrow { transform: translateX(3px) rotate(45deg); }

/* ---------- Hero ---------- */
.hero {
  position: relative;
  padding: 56px 0 90px;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: 40px;
  align-items: center;
}

.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--bg-2);
  border: 1px solid var(--hair);
  border-radius: var(--r-pill);
  padding: 8px 14px 8px 10px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-2);
}
.badge-logo {
  width: 22px; height: 22px;
  background: var(--ink);
  border-radius: 6px;
  display: grid; place-items: center;
  color: var(--lime);
  font-weight: 800; font-size: 12px;
}
.badge .stars { color: #E6A500; letter-spacing: -1px; }

.h1 {
  font-size: clamp(44px, 6.2vw, 80px);
  line-height: .98;
  letter-spacing: -.035em;
  font-weight: 800;
  margin: 22px 0 22px;
  color: var(--ink);
}
.h1 .word { display: inline-block; }
.h1 .accent {
  position: relative;
  white-space: nowrap;
}
.h1 .accent .underline {
  position: absolute;
  left: -2%;
  right: -2%;
  bottom: 6px;
  height: 14px;
  background: var(--lime);
  z-index: -1;
  border-radius: 4px;
  transform-origin: left center;
  transform: scaleX(0);
  animation: drawUnderline 1s cubic-bezier(.2,.8,.2,1) .9s forwards;
}
@keyframes drawUnderline {
  to { transform: scaleX(1); }
}

.lede {
  font-size: 19px;
  line-height: 1.55;
  color: var(--ink-2);
  max-width: 480px;
  margin: 0 0 32px;
}

.cta-row {
  display: flex;
  align-items: center;
  background: #fff;
  border: 1.5px solid var(--ink);
  border-radius: var(--r-pill);
  padding: 6px 6px 6px 22px;
  max-width: 520px;
  box-shadow: 4px 4px 0 var(--ink);
}
.cta-row input {
  flex: 1;
  border: none;
  background: transparent;
  font: inherit;
  font-size: 16px;
  outline: none;
  padding: 12px 0;
  color: var(--ink);
}
.cta-row input::placeholder { color: #9a9a90; }
.cta-row .suffix {
  color: var(--muted);
  font-size: 15px;
  margin-right: 12px;
}
.cta-row .btn { box-shadow: none; }
.cta-row .btn:hover { transform: none; box-shadow: none; background: var(--lime-2); }

.cta-sub {
  margin-top: 18px;
  font-size: 15px;
  color: var(--ink-2);
}
.cta-sub a { font-weight: 700; border-bottom: 1.5px solid var(--ink); }

/* fade-up base */
.fade-up { opacity: 0; transform: translateY(20px); transition: opacity .8s ease, transform .8s cubic-bezier(.2,.8,.2,1); }
.fade-up.in { opacity: 1; transform: translateY(0); }
.fade-up.d1 { transition-delay: .1s; }
.fade-up.d2 { transition-delay: .2s; }
.fade-up.d3 { transition-delay: .35s; }
.fade-up.d4 { transition-delay: .5s; }
.fade-up.d5 { transition-delay: .65s; }

/* word stagger */
.word-reveal { overflow: hidden; display: inline-block; vertical-align: bottom; }
.word-reveal > span { display: inline-block; transform: translateY(110%); animation: wordUp .9s cubic-bezier(.2,.85,.25,1) forwards; }
@keyframes wordUp { to { transform: translateY(0); } }

/* ---------- Hero Illustration ---------- */
.illo {
  position: relative;
  width: 100%;
  aspect-ratio: 1.05/1;
  min-height: 560px;
}
.illo .label {
  position: absolute;
  font-family: var(--font-hand);
  font-weight: 700;
  font-size: 26px;
  color: var(--ink);
}
.illo .label.before { left: 6%; top: 4%; }
.illo .label.after { right: 16%; top: 0; }
.illo .label .swoosh {
  display: block;
  height: 4px;
  width: 60px;
  background: var(--lime);
  border-radius: 2px;
  margin-top: -2px;
  transform-origin: left;
  animation: drawUnderline .8s cubic-bezier(.2,.8,.2,1) 1.1s both;
}

.before-card {
  position: absolute;
  left: 4%;
  top: 18%;
  width: 38%;
  height: 64%;
  background: #fff;
  border: 1.5px solid var(--ink);
  border-radius: 22px;
  padding: 22px 18px;
  transform: rotate(-7deg);
  box-shadow: 6px 8px 0 var(--ink);
  font-family: var(--font-hand);
  animation: gentleFloat 6s ease-in-out infinite;
}
.before-card h4 {
  font-size: 26px;
  margin: 0 0 8px;
  letter-spacing: -.01em;
}
.before-card .scribble {
  height: 2px;
  background: var(--ink);
  margin: 8px 0;
  border-radius: 1px;
  opacity: .8;
}
.before-card .scribble.s1 { width: 84%; }
.before-card .scribble.s2 { width: 68%; }
.before-card .scribble.s3 { width: 76%; }
.before-card .stamp {
  position: absolute;
  bottom: 14px;
  left: 18px;
  right: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 22px;
}
.before-card .chaos {
  margin: 20px 0 0;
  font-size: 32px;
  color: var(--ink);
  transform: rotate(-3deg);
  line-height: 1;
}
.before-card .chaos em { color: #c43; font-style: italic; }

@keyframes gentleFloat {
  0%, 100% { transform: rotate(-7deg) translateY(0); }
  50% { transform: rotate(-6deg) translateY(-8px); }
}

.after-stack {
  position: absolute;
  right: 0;
  top: 6%;
  width: 70%;
  height: 92%;
}
.browser {
  position: absolute;
  inset: 0;
  background: #fff;
  border: 1.5px solid var(--ink);
  border-radius: 14px;
  box-shadow: 10px 12px 0 var(--ink);
  overflow: hidden;
  animation: floatY 7s ease-in-out infinite;
}
.browser-bar {
  height: 30px;
  background: #F4F4EE;
  border-bottom: 1.5px solid var(--ink);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
}
.browser-bar .dot { width: 9px; height: 9px; border-radius: 50%; border: 1.2px solid var(--ink); }
.browser-bar .dot.r { background: #FF6B6B; }
.browser-bar .dot.y { background: #FFD86E; }
.browser-bar .dot.g { background: #8FE388; }
.browser-bar .url {
  margin-left: 14px;
  flex: 1;
  height: 18px;
  background: #fff;
  border: 1px solid var(--ink);
  border-radius: 5px;
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-size: 10px;
  color: var(--muted);
  font-family: var(--font-mono);
}
.browser-body { padding: 18px; }

@keyframes floatY {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.dash-card {
  border: 1.5px solid var(--ink);
  border-radius: 8px;
  margin-bottom: 14px;
  position: relative;
  box-shadow: 3px 3px 0 var(--ink);
}
.dash-card.lime {
  background: var(--lime);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: .04em;
}
.dash-card.lime .pills { display: flex; gap: 6px; font-size: 9px; font-weight: 700; }
.dash-card.lime .pills span { background: rgba(14,14,12,.08); padding: 3px 6px; border-radius: 4px; }
.dash-card.image {
  height: 76px;
  background: linear-gradient(135deg, var(--peach), var(--cream));
  background-image:
    radial-gradient(circle at 30% 40%, rgba(0,0,0,.06) 0 2px, transparent 3px),
    radial-gradient(circle at 70% 60%, rgba(0,0,0,.06) 0 2px, transparent 3px),
    linear-gradient(135deg, var(--peach), var(--cream));
  display: grid;
  place-items: center;
  font-size: 22px;
}
.dash-card.green {
  background: var(--mint);
  padding: 12px 14px;
  position: relative;
}
.dash-card.green .tag {
  position: absolute;
  right: -8px;
  top: 50%;
  transform: translateY(-50%) rotate(-4deg);
  background: var(--lime);
  border: 1.5px solid var(--ink);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .04em;
  box-shadow: 2px 2px 0 var(--ink);
}
.dash-card.green h5 {
  margin: 0 0 4px;
  font-size: 11px;
  letter-spacing: .06em;
  text-transform: uppercase;
  font-weight: 800;
}
.dash-card.green p { margin: 0; font-size: 10px; color: var(--ink-2); }
.dash-card.lilac {
  background: var(--lilac);
  padding: 12px 14px;
}
.dash-card.lilac .header { text-align: center; font-size: 9.5px; font-weight: 800; letter-spacing: .08em; margin-bottom: 8px; }
.dash-card.lilac .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.dash-card.lilac .thumb {
  background: #fff;
  border: 1.2px solid var(--ink);
  border-radius: 4px;
  aspect-ratio: 1/1;
  display: grid;
  place-items: center;
  font-size: 18px;
}
.dash-card.lilac .row .label {
  background: var(--lime);
  border: 1px solid var(--ink);
  font-size: 7px;
  font-weight: 800;
  text-align: center;
  margin-top: 4px;
  padding: 2px 0;
  border-radius: 3px;
}

.doodles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}
.doodles svg { width: 100%; height: 100%; overflow: visible; }
.doodle-path { fill: none; stroke: var(--ink); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.dash-svg { stroke-dasharray: 600; stroke-dashoffset: 600; animation: dash 2s cubic-bezier(.6,.1,.4,1) 1.2s forwards; }
@keyframes dash { to { stroke-dashoffset: 0; } }

.floating-icon {
  position: absolute;
  width: 38px; height: 38px;
  background: #fff;
  border: 1.5px solid var(--ink);
  border-radius: 50%;
  display: grid; place-items: center;
  box-shadow: 3px 3px 0 var(--ink);
}
.floating-icon.ic-1 { top: 22%; right: 18%; animation: bob 4s ease-in-out infinite; }
.floating-icon.ic-2 { bottom: 14%; right: 6%; animation: bob 5s ease-in-out infinite .5s; }
.floating-icon.ic-3 { bottom: 6%; left: 28%; animation: bob 4.5s ease-in-out infinite 1s; }
@keyframes bob {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-10px) rotate(3deg); }
}

.sparkle { position: absolute; color: var(--ink); }
.sparkle.s1 { top: 12%; right: 32%; animation: twinkle 2s ease-in-out infinite; }
.sparkle.s2 { top: 56%; right: 4%; animation: twinkle 2.4s ease-in-out infinite .5s; }
.sparkle.s3 { top: 80%; left: 50%; animation: twinkle 2s ease-in-out infinite 1s; }
@keyframes twinkle {
  0%, 100% { transform: scale(1); opacity: .85; }
  50% { transform: scale(1.4); opacity: 1; }
}

.hero::before, .hero::after {
  content: "";
  position: absolute;
  top: 0; bottom: 0;
  width: 3px;
  background: var(--lime);
}
.hero::before { left: -1px; }
.hero::after { right: -1px; }

/* ---------- Logos strip ---------- */
.logos {
  border-top: 1px solid var(--hair);
  border-bottom: 1px solid var(--hair);
  padding: 32px 0;
  background: var(--bg);
}
.logos-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
}
.logos-label {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  white-space: nowrap;
}
.logos-track {
  overflow: hidden;
  flex: 1;
  mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
}
.logos-marquee {
  display: flex;
  gap: 56px;
  animation: marquee 28s linear infinite;
  width: max-content;
}
.logos-marquee > div {
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -.02em;
  color: var(--ink);
  opacity: .85;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.logos-marquee svg { width: 28px; height: 28px; }
@keyframes marquee {
  to { transform: translateX(-50%); }
}

/* ---------- Section header ---------- */
.section { padding: 120px 0; position: relative; }
.section-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--ink-2);
  background: var(--bg-2);
  padding: 6px 14px;
  border-radius: var(--r-pill);
  border: 1px solid var(--hair);
}
.section-eyebrow .dot { width: 7px; height: 7px; background: var(--lime-deep); border-radius: 50%; }
.section-title {
  font-size: clamp(36px, 4.6vw, 60px);
  line-height: 1.02;
  letter-spacing: -.03em;
  font-weight: 800;
  margin: 18px 0 16px;
  max-width: 18ch;
}
.section-lede {
  font-size: 18px;
  color: var(--ink-2);
  max-width: 56ch;
  line-height: 1.55;
  margin: 0;
}
.section-head { margin-bottom: 56px; }
.section-head.center { text-align: center; }
.section-head.center .section-title,
.section-head.center .section-lede { margin-left: auto; margin-right: auto; }

/* ---------- Features ---------- */
.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}
.feature {
  border: 1.5px solid var(--ink);
  border-radius: 22px;
  padding: 28px;
  background: #fff;
  position: relative;
  overflow: hidden;
  transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease;
  min-height: 360px;
  display: flex;
  flex-direction: column;
}
.feature:hover { transform: translateY(-4px); box-shadow: 8px 10px 0 var(--ink); }
.feature.big { grid-column: span 2; }
.feature.bg-lime { background: var(--lime); }
.feature.bg-mint { background: var(--mint); }
.feature.bg-cream { background: var(--cream); }
.feature.bg-lilac { background: var(--lilac); }

.feature .num {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  letter-spacing: .08em;
}
.feature h3 {
  font-size: 26px;
  line-height: 1.08;
  letter-spacing: -.02em;
  font-weight: 800;
  margin: 16px 0 10px;
}
.feature p {
  margin: 0;
  font-size: 15.5px;
  line-height: 1.55;
  color: var(--ink-2);
}
.feature .visual {
  margin-top: auto;
  padding-top: 22px;
}

/* Mini calendar widget */
.mini-cal {
  background: #fff;
  border: 1.5px solid var(--ink);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 3px 3px 0 var(--ink);
  width: 100%;
  max-width: 280px;
}
.mini-cal .mc-head {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; font-weight: 700; margin-bottom: 8px;
}
.mini-cal .mc-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.mini-cal .day {
  aspect-ratio: 1/1;
  display: grid; place-items: center;
  font-size: 10px; font-weight: 600;
  border-radius: 4px;
  color: var(--ink-2);
}
.mini-cal .day.active { background: var(--ink); color: var(--lime); }
.mini-cal .day.event { background: var(--lime); color: var(--ink); }

/* Bar chart */
.bars {
  display: flex; align-items: flex-end; gap: 8px;
  height: 110px;
  padding: 12px;
  background: #fff;
  border: 1.5px solid var(--ink);
  border-radius: 10px;
  box-shadow: 3px 3px 0 var(--ink);
}
.bar {
  flex: 1;
  background: var(--ink);
  border-radius: 3px 3px 0 0;
  transition: height 1s cubic-bezier(.2,.8,.2,1);
}
.bar.lime { background: var(--lime); border: 1.5px solid var(--ink); }
.bar.grass { background: var(--grass); }
.bar.mint { background: var(--mint); border: 1.5px solid var(--ink); }

/* Roster mock */
.roster {
  background: #fff;
  border: 1.5px solid var(--ink);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 3px 3px 0 var(--ink);
}
.roster .row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 6px;
  border-bottom: 1px solid var(--hair);
  font-size: 13px;
}
.roster .row:last-child { border-bottom: none; }
.roster .av {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: grid; place-items: center;

  function Counter({target}) {
    const match = target.match(/^([^\d]*)(\d+)(.*)$/);
    if (!match) return <>{target}</>;
    const [, pre, numStr, post] = match;
    const final = parseInt(numStr, 10);
    const [val, setVal] = React.useState(0);
    React.useEffect(() => {
      const start = performance.now();
      const dur = 1400;
      let raf;
      const tick = (t) => {
        const p = Math.min(1, (t - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        setVal(Math.round(final * eased));
        if (p < 1) raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(raf);
    }, [final]);
    return <>{pre}{val}{post}</>;
  }

  function StatItem({big, label}) {
    const ref = React.useRef(null);
    const [shown, setShown] = React.useState(false);
    React.useEffect(() => {
      const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) setShown(true); }, {threshold: .4});
      if (ref.current) io.observe(ref.current);
      return () => io.disconnect();
    }, []);
    return (
      <div className="stat" ref={ref}>
        <div className="num">{shown ? <Counter target={big} /> : big.replace(/[0-9]/g, '0')}</div>
        <div className="lbl">{label}</div>
      </div>
    );
  }

  /* ── App ── */
  function App() {
    React.useEffect(() => {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: .12, rootMargin: '0px 0px -60px 0px' });

      const selectors = [
        '.section-eyebrow', '.section-title', '.section-lede',
        '.feature', '.t-card', '.plan', '.kpi', '.dash-panel',
        '.dash-wrap', '.stat', '.cta-band', '.foot-grid',
      ];
      document.querySelectorAll(selectors.join(',')).forEach((el, i) => {
        if (!el.classList.contains('fade-up')) el.classList.add('fade-up');
        const idx = [...(el.parentElement?.children || [])].indexOf(el);
        if (idx >= 0 && idx <= 4) el.classList.add(`d${idx}`);
        io.observe(el);
      });

      return () => io.disconnect();
    }, []);

    return (
      <>
        <Nav />
        <main>
          <Hero />
          <Logos />
          <Features />
          <Dashboard />
          <Stats />
          <Testimonials />
          <Pricing />
          <CTA />
        </main>
        <Footer />
      </>
    );
  }
