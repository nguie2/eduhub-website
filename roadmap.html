<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roadmap — EduHubSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const NAV_LINKS=[['index.html#features','Features'],['case-studies.html','Case Studies'],['blog.html','Blog'],['pricing.html','Pricing'],['contact.html','Need help?']];
const FOOT_COLS=[{h:'Product',links:[['index.html#features','Features'],['pricing.html','Pricing'],['integrations.html','Integrations'],['changelog.html','Changelog'],['roadmap.html','Roadmap']]},{h:'Resources',links:[['case-studies.html','Case studies'],['help.html','Help centre'],['migration.html','Migration guide'],['blog.html','Blog'],['mailto:infos@eduhubsa.online','infos@eduhubsa.online']]},{h:'Company',links:[['about.html','About'],['careers.html','Careers'],['contact.html','Contact'],['privacy.html','POPIA & Privacy'],['terms.html','Terms']]}];
function Nav(){const[s,setS]=React.useState(false);React.useEffect(()=>{const f=()=>setS(window.scrollY>12);f();window.addEventListener('scroll',f,{passive:true});return()=>window.removeEventListener('scroll',f);},[]);return(<header className={`nav-wrap ${s?'scrolled':''}`}><div className="container nav"><a href="index.html" className="brand"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polygon points="14,4 26,10 14,16 2,10" fill="var(--lime)" stroke="var(--ink)" strokeWidth="1.5" strokeLinejoin="round"/><path d="M6 12.5V19.5C6 19.5 9.5 22.5 14 22.5C18.5 22.5 22 19.5 22 19.5V12.5" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round" fill="none"/><line x1="26" y1="10" x2="26" y2="17" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round"/><circle cx="26" cy="17.5" r="1.5" fill="var(--ink)"/></svg>eduhub<span style={{color:'var(--lime-deep)'}}>sa</span></a><nav className="nav-links">{NAV_LINKS.map(([h,l])=><a key={l} className="nav-link" href={h}>{l}</a>)}</nav><a className="btn" href="contact.html">Start free trial</a></div></header>);}
function Footer(){return(<footer className="footer"><div className="container"><div className="foot-grid"><div><a href="index.html" className="brand" style={{color:'var(--bg)'}}><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polygon points="14,4 26,10 14,16 2,10" fill="var(--lime)" stroke="var(--ink)" strokeWidth="1.5" strokeLinejoin="round"/><path d="M6 12.5V19.5C6 19.5 9.5 22.5 14 22.5C18.5 22.5 22 19.5 22 19.5V12.5" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round" fill="none"/><line x1="26" y1="10" x2="26" y2="17" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round"/><circle cx="26" cy="17.5" r="1.5" fill="var(--ink)"/></svg>eduhubsa</a><p className="foot-blurb">South African institution management.</p></div>{FOOT_COLS.map(({h,links})=><div key={h}><h5>{h}</h5><ul>{links.map(([href,label])=><li key={label}><a href={href}>{label}</a></li>)}</ul></div>)}</div><div className="foot-bottom"><div>© 2026 EduHubSA (Pty) Ltd.</div><div className="links"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="security.html">Security</a></div></div></div></footer>);}

const roadmap=[
  {label:'Now — Q2 2026',cls:'now',items:[
    {t:'AI attendance anomaly detection',d:'Automatically flag unusual patterns — a learner absent every Monday, a class missing every period 5.'},
    {t:'Bulk timetable import',d:'Import timetables directly from Excel templates used by SACE and provincial departments.'},
    {t:'Expanded offline mobile',d:'Full fee collection, parent messaging, and report viewing in offline mode.'},
  ]},
  {label:'Q3 2026',cls:'soon',items:[
    {t:'Learner wellbeing tracker',d:'Confidential flagging system for counsellors to log and track at-risk learner interventions.'},
    {t:'NSFAS integration',d:'Direct API link to NSFAS for automatic bursary verification and disbursement tracking.'},
    {t:'Custom dashboards',d:'Drag-and-drop dashboard builder for principals to pin the metrics they care about most.'},
    {t:'isiXhosa & Sesotho support',d:'Parent portal and SMS notifications in two more official languages.'},
  ]},
  {label:'Q4 2026',cls:'later',items:[
    {t:'Parent-teacher meeting scheduler',d:'Self-serve booking for parents with calendar sync and automatic reminder SMSes.'},
    {t:'Procurement module',d:'Asset register and basic procurement workflows for school bursaries.'},
    {t:'Data analytics for DBE reporting',d:'One-click export in the exact format required for Department of Basic Education submissions.'},
  ]},
  {label:'2027 & beyond',cls:'future',items:[
    {t:'AI exam preparation assistant',d:'Surfacing past exam trends by topic to help teachers focus revision sessions.'},
    {t:'Alumni management',d:'Track graduates, support career placement, and enable alumni fundraising.'},
    {t:'Multi-country support',d:'Adapting EduHubSA for Namibia, Botswana, and Zimbabwe with local compliance modules.'},
  ]},
];

function Page(){
  return(
    <>
      <section className="page-hero"><div className="container"><span className="section-eyebrow"><span className="dot"/>What's coming</span><h1 style={{marginTop:14}}>Roadmap</h1><p>Our public roadmap — what we're building now, what's next, and what we're thinking about. Have a feature request? Email us at infos@eduhubsa.online.</p></div></section>
      <section className="inner-section"><div className="container">
        <div style={{background:'var(--bg-2)',border:'1px solid var(--hair)',borderRadius:14,padding:'18px 22px',marginBottom:48,display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          {[['now','In progress'],['soon','Planned'],['later','Researching'],['future','Under consideration']].map(([cls,label])=>(
            <span key={cls} style={{display:'flex',alignItems:'center',gap:6,fontSize:14,fontWeight:600}}>
              <span className={`road-label ${cls}`} style={{margin:0,padding:'3px 10px',fontSize:11}}>{label}</span>
            </span>
          ))}
          <span style={{fontSize:13,color:'var(--muted)',marginLeft:'auto'}}>Dates are targets, not commitments.</span>
        </div>
        {roadmap.map(({label,cls,items},i)=>(
          <div key={i} className="road-section">
            <div className={`road-label ${cls}`}>{label}</div>
            <div className="road-grid">
              {items.map(({t,d})=>(
                <div key={t} className="road-item">
                  <h4>{t}</h4>
                  <p>{d}</p>
                </div>
              ))}
            </div>
          </div>
        ))}
        <div style={{marginTop:32,border:'1.5px solid var(--ink)',borderRadius:14,padding:'28px',background:'var(--lime)',textAlign:'center'}}>
          <h3 style={{fontSize:22,fontWeight:800,margin:'0 0 8px'}}>Have a feature request?</h3>
          <p style={{color:'var(--ink-2)',margin:'0 0 16px'}}>We build what our institutions need. Tell us what would change your day.</p>
          <a className="btn btn-dark" href="mailto:infos@eduhubsa.online?subject=Feature request">Send a feature request</a>
        </div>
      </div></section>
    </>
  );
}
function App(){
  React.useEffect(()=>{const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1});document.querySelectorAll('.road-item').forEach(el=>{el.classList.add('fade-up');io.observe(el);});return()=>io.disconnect();},[]);
  return(<><Nav/><main><Page/></main><Footer/></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
