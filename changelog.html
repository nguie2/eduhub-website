<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Changelog — EduHubSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const NAV_LINKS=[['index.html#features','Features'],['case-studies.html','Case Studies'],['blog.html','Blog'],['pricing.html','Pricing'],['contact.html','Need help?']];
const FOOT_COLS=[{h:'Product',links:[['index.html#features','Features'],['pricing.html','Pricing'],['integrations.html','Integrations'],['changelog.html','Changelog'],['roadmap.html','Roadmap']]},{h:'Resources',links:[['case-studies.html','Case studies'],['help.html','Help centre'],['migration.html','Migration guide'],['blog.html','Blog'],['mailto:infos@eduhubsa.online','infos@eduhubsa.online']]},{h:'Company',links:[['about.html','About'],['careers.html','Careers'],['contact.html','Contact'],['privacy.html','POPIA & Privacy'],['terms.html','Terms']]}];
function Nav(){const[s,setS]=React.useState(false);React.useEffect(()=>{const f=()=>setS(window.scrollY>12);f();window.addEventListener('scroll',f,{passive:true});return()=>window.removeEventListener('scroll',f);},[]);return(<header className={`nav-wrap ${s?'scrolled':''}`}><div className="container nav"><a href="index.html" className="brand"><span className="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 10l9-6 9 6-9 6-9-6z"/><path d="M7 12.5V17c2.5 2 7.5 2 10 0v-4.5"/></svg></span>eduhub<span style={{color:'var(--lime-deep)'}}>sa</span></a><nav className="nav-links">{NAV_LINKS.map(([h,l])=><a key={l} className="nav-link" href={h}>{l}</a>)}</nav><a className="btn" href="contact.html">Start free trial</a></div></header>);}
function Footer(){return(<footer className="footer"><div className="container"><div className="foot-grid"><div><a href="index.html" className="brand" style={{color:'var(--bg)'}}><span className="brand-mark" style={{background:'var(--lime)',color:'var(--ink)'}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 10l9-6 9 6-9 6-9-6z"/><path d="M7 12.5V17c2.5 2 7.5 2 10 0v-4.5"/></svg></span>eduhubsa</a><p className="foot-blurb">South African institution management.</p></div>{FOOT_COLS.map(({h,links})=><div key={h}><h5>{h}</h5><ul>{links.map(([href,label])=><li key={label}><a href={href}>{label}</a></li>)}</ul></div>)}</div><div className="foot-bottom"><div>© 2026 EduHubSA (Pty) Ltd.</div><div className="links"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="security.html">Security</a></div></div></div></footer>);}

const releases=[
  {v:'2.3.0',date:'22 May 2026',label:'latest',items:['Offline sync now works for fee collection — payments queued locally and submitted when connectivity restores','Attendance: bulk-mark entire classes absent with one tap on mobile','Parent portal: marks now displayed per subject with trend graph','Timetable engine: added support for split-period lessons','WhatsApp: message delivery receipts now visible in activity log','Performance: dashboard load time reduced from 480ms to 180ms']},
  {v:'2.2.0',date:'14 Apr 2026',label:'',items:['New: multi-campus support — manage up to 10 campuses from a single admin account','New: PayShap integration for instant fee collection','Fees: automated instalment plan builder for term-based payments','Reports: new matric readiness report by subject and learner','Mobile app: biometric login (fingerprint / face) now supported','Fixed: timetable export to Excel missing room numbers']},
  {v:'2.1.0',date:'3 Mar 2026',label:'',items:['New: Afrikaans and isiZulu added to parent portal (4 languages now supported)','New: SAQA/NSFAS reporting module for tertiary institutions','Attendance: QR code scanning for roll-call now available on Android','Fees: dunning workflow — automatic escalation after 3 missed reminders','API: new webhooks for fee payment and attendance events','Security: MFA now enforced for all admin accounts']},
  {v:'2.0.0',date:'10 Jan 2026',label:'major',items:['Complete dashboard redesign — faster, calmer, more information density','New: principal analytics view with cross-school benchmarking','New: parent mobile app (iOS + Android) — live marks, fees, timetable','Timetable: new constraint engine resolves clashes 10× faster','Data import: support for Excel, CSV, and CEMIS formats','Infrastructure: migrated to dual SA data-centre active-active setup']},
  {v:'1.9.0',date:'15 Oct 2025',label:'',items:['New: staff leave management module','Fees: WhatsApp fee statement PDFs with school branding','Attendance: loadshedding-aware offline mode (stores up to 72hrs of data)','Reports: custom report builder — drag-and-drop fields and filters','Integration: Google Workspace SSO for staff accounts']},
];

function Page(){
  return(
    <>
      <section className="page-hero"><div className="container"><span className="section-eyebrow"><span className="dot"/>What's new</span><h1 style={{marginTop:14}}>Changelog</h1><p>Every update to EduHubSA, from major releases to small improvements. We ship continuously — updates land in your dashboard automatically.</p></div></section>
      <section className="inner-section"><div className="container" style={{maxWidth:800}}>
        {releases.map(({v,date,label,items},i)=>(
          <div key={i} className="cl-entry">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <span className="cl-tag">v{v}</span>
              {label==='latest'&&<span style={{fontSize:11,fontWeight:700,background:'var(--lime)',border:'1px solid var(--ink)',padding:'3px 10px',borderRadius:999}}>LATEST</span>}
              {label==='major'&&<span style={{fontSize:11,fontWeight:700,background:'var(--ink)',color:'var(--lime)',padding:'3px 10px',borderRadius:999}}>MAJOR</span>}
            </div>
            <div className="cl-date">{date}</div>
            <ul className="cl-items">{items.map((item,j)=><li key={j}>{item}</li>)}</ul>
          </div>
        ))}
        <div style={{textAlign:'center',paddingTop:32,borderTop:'1px solid var(--hair)'}}>
          <p style={{color:'var(--muted)',fontSize:14}}>EduHubSA launched in 2024. Earlier release notes available on request.</p>
          <a href="mailto:infos@eduhubsa.online?subject=Historical changelog" style={{fontSize:14,fontWeight:700,borderBottom:'1.5px solid var(--ink)'}}>Request full history</a>
        </div>
      </div></section>
    </>
  );
}
function App(){return(<><Nav/><main><Page/></main><Footer/></>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
