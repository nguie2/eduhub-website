<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact Us — EduHubSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
function Nav() {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 12);
    fn(); window.addEventListener('scroll', fn, {passive:true});
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <header className={`nav-wrap ${scrolled?'scrolled':''}`}>
      <div className="container nav">
        <a href="index.html" className="brand">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polygon points="14,4 26,10 14,16 2,10" fill="var(--lime)" stroke="var(--ink)" strokeWidth="1.5" strokeLinejoin="round"/><path d="M6 12.5V19.5C6 19.5 9.5 22.5 14 22.5C18.5 22.5 22 19.5 22 19.5V12.5" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round" fill="none"/><line x1="26" y1="10" x2="26" y2="17" stroke="var(--ink)" strokeWidth="1.5" strokeLinecap="round"/><circle cx="26" cy="17.5" r="1.5" fill="var(--ink)"/></svg>
          eduhub<span style={{color:'var(--lime-deep)'}}>sa</span>
        </a>
        <nav className={`nav-links${m?' open':''}`}>
          <a className="nav-link" href="index.html#features">Features</a>
          <a className="nav-link" href="case-studies.html">Case Studies</a>
          <a className="nav-link" href="blog.html">Blog</a>
          <a className="nav-link" href="pricing.html">Pricing</a>
          <a className="nav-link" href="contact.html">Need help?</a>
        </nav>
        <a className="btn nav-cta" href="contact.html">Start free trial</a>
      </div>
    </header>
  );
}

function Footer() {
  return (
    <footer className="footer" id="contact">
      <div className="container">
        <div className="foot-grid">
          <div>
            <a href="index.html" className="brand" style={{color:'var(--bg)'}}>
              <span className="brand-mark" style={{background:'var(--lime)',color:'var(--ink)'}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 10l9-6 9 6-9 6-9-6z"/><path d="M7 12.5V17c2.5 2 7.5 2 10 0v-4.5"/></svg>
              </span>eduhubsa
            </a>
            <p className="foot-blurb">A calm, low-cost institution management system built in South Africa, for South African schools and universities. POPIA-compliant. Loadshedding-friendly.</p>
            <div style={{display:'flex',gap:10}}>
              {[
                {label:'X',href:'#',icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>},
                {label:'LinkedIn',href:'#',icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>},
                {label:'Instagram',href:'#',icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>},
                {label:'YouTube',href:'#',icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="var(--bg)"/></svg>},
              ].map(({label,href,icon})=>(
                <a key={label} href={href} aria-label={label} style={{width:38,height:38,borderRadius:'50%',border:'1px solid rgba(250,250,242,.2)',display:'grid',placeItems:'center',color:'var(--bg)',transition:'all .2s ease'}}
                  onMouseEnter={e=>{e.currentTarget.style.background='var(--lime)';e.currentTarget.style.borderColor='var(--lime)';e.currentTarget.style.color='var(--ink)';}}
                  onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor='rgba(250,250,242,.2)';e.currentTarget.style.color='var(--bg)';}}>
                  {icon}
                </a>
              ))}
            </div>
          </div>
          <div><h5>Product</h5><ul><li><a href="index.html#features">Features</a></li><li><a href="pricing.html">Pricing</a></li><li><a href="integrations.html">Integrations</a></li><li><a href="changelog.html">Changelog</a></li><li><a href="roadmap.html">Roadmap</a></li></ul></div>
          <div><h5>Resources</h5><ul><li><a href="case-studies.html">Case studies</a></li><li><a href="help.html">Help centre</a></li><li><a href="migration.html">Migration guide</a></li><li><a href="blog.html">Blog</a></li><li><a href="mailto:infos@eduhubsa.online">infos@eduhubsa.online</a></li></ul></div>
          <div><h5>Company</h5><ul><li><a href="about.html">About</a></li><li><a href="careers.html">Careers</a></li><li><a href="contact.html">Contact</a></li><li><a href="privacy.html">POPIA &amp; Privacy</a></li><li><a href="terms.html">Terms</a></li></ul></div>
        </div>
        <div className="foot-bottom">
          <div>© 2026 EduHubSA (Pty) Ltd. Made in Johannesburg.</div>
          <div className="links"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="security.html">Security</a></div>
        </div>
      </div>
    </footer>
  );
}

function ContactForm() {
  const [sent, setSent] = React.useState(false);
  const [form, setForm] = React.useState({name:'', email:'', institution:'', type:'', message:''});
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const submit = e => { e.preventDefault(); window.location.href = `mailto:infos@eduhubsa.online?subject=Enquiry from ${form.name} — ${form.institution}&body=${encodeURIComponent(form.message)}`; setSent(true); };
  if (sent) return (
    <div style={{textAlign:'center',padding:'48px 32px',border:'1.5px solid var(--ink)',borderRadius:18,background:'var(--lime)'}}>
      <div style={{fontSize:40,marginBottom:16}}>✓</div>
      <h3 style={{fontSize:26,fontWeight:800,margin:'0 0 8px'}}>Message sent!</h3>
      <p style={{color:'var(--ink-2)',margin:0}}>We'll get back to you at <strong>{form.email}</strong> within 24 hours.</p>
    </div>
  );
  return (
    <form onSubmit={submit}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="form-group">
          <label className="form-label">Your name</label>
          <input className="form-input" type="text" placeholder="Thabo Nkosi" required value={form.name} onChange={set('name')} />
        </div>
        <div className="form-group">
          <label className="form-label">Email address</label>
          <input className="form-input" type="email" placeholder="thabo@school.edu.za" required value={form.email} onChange={set('email')} />
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="form-group">
          <label className="form-label">Institution name</label>
          <input className="form-input" type="text" placeholder="Your school or university" value={form.institution} onChange={set('institution')} />
        </div>
        <div className="form-group">
          <label className="form-label">I am a…</label>
          <select className="form-select" value={form.type} onChange={set('type')}>
            <option value="">Select role</option>
            <option>Principal / Head of Institution</option>
            <option>IT Administrator</option>
            <option>Bursar / Finance</option>
            <option>Department Head</option>
            <option>Teacher / Educator</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div className="form-group">
        <label className="form-label">How can we help?</label>
        <textarea className="form-textarea" placeholder="Tell us about your institution and what you're looking to solve…" required value={form.message} onChange={set('message')} />
      </div>
      <button className="btn" type="submit" style={{width:'100%',justifyContent:'center',fontSize:16,padding:'16px 28px'}}>
        Send message
        <span className="btn-arrow"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
      </button>
    </form>
  );
}

function Page() {
  return (
    <>
      <section className="page-hero">
        <div className="container">
          <span className="section-eyebrow eyebrow"><span className="dot"/>Contact us</span>
          <h1 style={{marginTop:14}}>We'd love to hear<br/>from you.</h1>
          <p>Whether you're ready to start a trial, need a custom quote, or just have questions — our team responds within 24 hours.</p>
        </div>
      </section>

      <section className="inner-section">
        <div className="container">
          <div style={{display:'grid',gridTemplateColumns:'1.2fr 1fr',gap:64,alignItems:'start'}}>
            <div>
              <h2 style={{fontSize:28,fontWeight:800,letterSpacing:'-.02em',margin:'0 0 28px'}}>Send us a message</h2>
              <ContactForm />
            </div>
            <div>
              <div className="inner-card" style={{marginBottom:22}}>
                <div style={{fontSize:28,marginBottom:14}}>✉</div>
                <h3 style={{fontSize:18,fontWeight:800,margin:'0 0 6px'}}>Email us directly</h3>
                <p style={{color:'var(--ink-2)',fontSize:15,margin:'0 0 12px'}}>For general enquiries, pricing, and support:</p>
                <a href="mailto:infos@eduhubsa.online" style={{fontWeight:800,fontSize:16,borderBottom:'2px solid var(--ink)'}}>infos@eduhubsa.online</a>
              </div>
              <div className="inner-card mint" style={{marginBottom:22}}>
                <div style={{fontSize:28,marginBottom:14}}>📞</div>
                <h3 style={{fontSize:18,fontWeight:800,margin:'0 0 6px'}}>Book a live demo</h3>
                <p style={{color:'var(--ink-2)',fontSize:15,margin:'0 0 12px'}}>See EduHubSA in action with one of our specialists. 20 minutes, no pressure.</p>
                <a className="btn" href="mailto:infos@eduhubsa.online?subject=Book a demo" style={{display:'inline-flex'}}>Book a demo</a>
              </div>
              <div className="inner-card cream">
                <div style={{fontSize:28,marginBottom:14}}>📍</div>
                <h3 style={{fontSize:18,fontWeight:800,margin:'0 0 6px'}}>Office</h3>
                <p style={{color:'var(--ink-2)',fontSize:15,margin:0}}>Johannesburg, Gauteng<br/>South Africa<br/><br/>We serve institutions across all nine provinces.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section style={{background:'var(--bg-2)',borderTop:'1px solid var(--hair)',borderBottom:'1px solid var(--hair)',padding:'64px 0'}}>
        <div className="container" style={{textAlign:'center'}}>
          <h2 style={{fontSize:32,fontWeight:800,letterSpacing:'-.02em',margin:'0 0 12px'}}>Common questions</h2>
          <p style={{color:'var(--ink-2)',fontSize:17,marginBottom:40}}>Fast answers before you reach out.</p>
          <div className="card-grid-3" style={{textAlign:'left'}}>
            {[
              {q:'How quickly can we go live?',a:'Most institutions are fully operational within 48–72 hours. We handle data import, onboarding, and first-run attendance together.'},
              {q:'Do you offer a free trial?',a:'Yes — 30 days, no credit card required. Your full institution, all features, with live support throughout.'},
              {q:'What happens to our data if we cancel?',a:'Your data is yours. Export everything in CSV/Excel format with one click. We retain nothing after 30 days of account closure.'},
            ].map(({q,a},i)=>(
              <div key={i} className="inner-card">
                <h3 style={{fontSize:17,fontWeight:800,margin:'0 0 8px'}}>{q}</h3>
                <p style={{fontSize:14,color:'var(--ink-2)',margin:0}}>{a}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    </>
  );
}

function App() {
  React.useEffect(()=>{
    const io = new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12,rootMargin:'0px 0px -60px 0px'});
    document.querySelectorAll('.inner-card,.section-eyebrow,.section-title,.page-hero h1,.page-hero p').forEach(el=>{el.classList.add('fade-up');io.observe(el);});
    return ()=>io.disconnect();
  },[]);
  return (<><Nav/><main><Page/></main><Footer/></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
